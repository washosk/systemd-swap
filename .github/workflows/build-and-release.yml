name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Build native packages
  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y make fpm ruby-dev build-essential

      - name: Install FPM
        run: |
          sudo gem install fpm

      - name: Build all packages
        run: |
          make ci-build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/
          retention-days: 30

      - name: List artifacts
        run: |
          echo "=== Built Artifacts ==="
          ls -lh dist/

  # Build and push Docker image
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep "PKG_VERSION" Makefile | head -1 | cut -d'=' -f2 | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=systemd-swap
            org.opencontainers.image.description=Simple swap file manager for systemd
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ steps.version.outputs.sha_short }}

  # Run tests
  test:
    name: Test Packages
    needs: build-packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/

      - name: Test .deb
        run: |
          echo "Testing .deb integrity..."
          cd dist/
          for deb in *.deb; do
            echo "  Checking $deb..."
            dpkg-deb -I "$deb" > /dev/null || exit 1
          done
          echo "✅ All .deb files are valid"

      - name: Test .rpm
        run: |
          echo "Testing .rpm integrity..."
          cd dist/
          for rpm in *.rpm; do
            echo "  Checking $rpm..."
            rpm -K "$rpm" || exit 1
          done
          echo "✅ All .rpm files are valid"

      - name: Test tar.gz
        run: |
          echo "Testing tar.gz archives..."
          cd dist/
          for tgz in *.tar.gz; do
            echo "  Extracting $tgz..."
            tar tzf "$tgz" > /dev/null || exit 1
          done
          echo "✅ All tar.gz files are valid"

  # Create release with artifacts
  release:
    name: Create Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build-packages, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release notes
        id: notes
        run: |
          echo "## systemd-swap ${{ steps.version.outputs.version }}" > /tmp/release.md
          echo "" >> /tmp/release.md
          echo "### Artifacts" >> /tmp/release.md
          echo "" >> /tmp/release.md
          echo "- **Debian/Ubuntu:** \`systemd-swap_${{ steps.version.outputs.version }}-1_amd64.deb\` (amd64)" >> /tmp/release.md
          echo "- **Debian/Ubuntu:** \`systemd-swap_${{ steps.version.outputs.version }}-1_arm64.deb\` (arm64)" >> /tmp/release.md
          echo "- **Fedora/RHEL:** \`systemd-swap-${{ steps.version.outputs.version }}-1.x86_64.rpm\` (x86_64)" >> /tmp/release.md
          echo "- **Fedora/RHEL:** \`systemd-swap-${{ steps.version.outputs.version }}-1.aarch64.rpm\` (aarch64)" >> /tmp/release.md
          echo "- **Universal:** \`systemd-swap-${{ steps.version.outputs.version }}-linux-amd64.tar.gz\` (tar.gz)" >> /tmp/release.md
          echo "- **Universal:** \`systemd-swap-${{ steps.version.outputs.version }}-linux-arm64.tar.gz\` (tar.gz)" >> /tmp/release.md
          echo "" >> /tmp/release.md
          echo "### Installation" >> /tmp/release.md
          echo "" >> /tmp/release.md
          echo "See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md) for detailed installation instructions." >> /tmp/release.md
          echo "" >> /tmp/release.md
          echo "**Quick install:**" >> /tmp/release.md
          echo "" >> /tmp/release.md
          echo "\`\`\`bash" >> /tmp/release.md
          echo "# Debian/Ubuntu" >> /tmp/release.md
          echo "sudo apt install ./systemd-swap_${{ steps.version.outputs.version }}-1_amd64.deb" >> /tmp/release.md
          echo "" >> /tmp/release.md
          echo "# Fedora/RHEL" >> /tmp/release.md
          echo "sudo dnf install ./systemd-swap-${{ steps.version.outputs.version }}-1.x86_64.rpm" >> /tmp/release.md
          echo "" >> /tmp/release.md
          echo "# Snap" >> /tmp/release.md
          echo "sudo snap install systemd-swap" >> /tmp/release.md
          echo "\`\`\`" >> /tmp/release.md
          cat /tmp/release.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          body_path: /tmp/release.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to Docker registries
  publish-docker:
    name: Publish Docker Image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build-docker, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep "PKG_VERSION" Makefile | head -1 | cut -d'=' -f2 | xargs)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Push to registry
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

  # Slack notification
  notify:
    name: Notify on Completion
    if: always()
    needs: [build-packages, test]
    runs-on: ubuntu-latest

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.build-packages.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ]; then
            echo "status=✅ Build successful" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Build failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        if: false  # Enable when Slack webhook is available
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "systemd-swap Build ${{ steps.status.outputs.status }}",
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "fields": [
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "${{ github.sha }}",
                      "short": true
                    },
                    {
                      "title": "Build Log",
                      "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "short": false
                    }
                  ]
                }
              ]
            }
